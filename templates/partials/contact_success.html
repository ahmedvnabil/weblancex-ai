{# HTMX fragment — replaces #contact-form-wrap after successful form submission #}
<div class="border border-green-500 p-8 text-center">
    <div class="flex items-center justify-center gap-2 mb-4 text-xs font-mono text-green-400">
        <span class="w-1.5 h-1.5 bg-green-400 inline-block"></span>
        <span>MESSAGE RECEIVED</span>
    </div>
    <h3 class="text-xl font-bold text-neutral-100 mb-3">
        Got it, {{ name }}.
    </h3>
    <p class="text-neutral-400 text-sm leading-relaxed mb-6 max-w-sm mx-auto">
        We'll review your brief and reply to <span class="text-neutral-200 font-mono">{{ email }}</span>
        within 24 hours with a scope, timeline, and quote.
    </p>
    <div class="text-xs text-neutral-600 font-mono">
        No sales call. No runaround. Just a straight answer.
    </div>
</div>
